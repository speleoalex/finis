<div class="container-fluid">
    <h3 class="mb-4">{step_title}</h3>

    <form method="post" action="{form_action}" onsubmit="return fncStepValidate(this, '{step_name}')">
        <div id="step-validation-msg" class="alert alert-warning d-none" role="alert">{txt_select_option}</div>
        <div class="mb-4">
            <!-- foreach {options} -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="{step_name}" value="{option_id}" id="{option_id}" {checked}>
                <label class="form-check-label" for="{option_id}">
                    <strong>{option_title}</strong>
                    <!-- if {has_cost} -->
                    <span class="text-muted">({txt_cost}: {option_cost})</span>
                    <!-- end if {has_cost} -->
                    <!-- if {has_description} -->
                    <div class="text-muted small">{option_description}</div>
                    <!-- end if {has_description} -->
                </label>
            </div>
            <!-- end foreach {options} -->

            <!-- if {old_style_html} -->
            {old_style_html}
            <!-- end if {old_style_html} -->
        </div>

        <div class="d-flex gap-2">
            <button type="button" class="btn btn-secondary" onclick="window.location='{url_back}'">{txt_back}</button>
            <button type="submit" class="btn btn-primary">{txt_next} &gt;&gt;</button>
        </div>
    </form>
</div>
<script>
function fncStepValidate(form, stepName) {
    var radios = form.querySelectorAll('input[type=radio][name="' + stepName + '"]');
    if (radios.length === 0) return true; // nessuna opzione a scelta singola: non bloccare
    for (var i = 0; i < radios.length; i++) {
        if (radios[i].checked) return true;
    }
    var box = document.getElementById('step-validation-msg');
    if (box) {
        box.classList.remove('d-none');
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return false;
}
</script>
